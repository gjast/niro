# Nginx config for nginx.studio (Next.js on port 4500)
# Place in /etc/nginx/sites-available/niro and symlink to sites-enabled
#
# Если видишь 404:
# 1. Запусти приложение: npm run build && npm run start:pm2
# 2. Проверь с сервера: curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4500/
# 3. Открывай в браузере именно http://nginx.studio (не по IP)
# 4. Логи nginx: sudo tail -f /var/log/nginx/error.log

upstream niro_next {
    server 127.0.0.1:4500;
    keepalive 64;
}

# Redirect HTTP -> HTTPS (uncomment after SSL is set up)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name nginx.studio www.nginx.studio;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    listen [::]:80;
    server_name nginx.studio www.nginx.studio;

    # Uncomment after obtaining SSL cert (e.g. certbot)
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/nginx.studio/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/nginx.studio/privkey.pem;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location / {
        proxy_pass http://niro_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache static Next.js assets
    location /_next/static {
        proxy_pass http://niro_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /favicon.ico {
        proxy_pass http://niro_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }
}
