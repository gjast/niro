# Пример конфига для niro.studio (Next.js на порту 4500).
# Лимит загрузки файлов — иначе 413 Payload Too Large.
# В блок server для HTTPS добавьте: client_max_body_size 50M;

server {
    server_name niro.studio;
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:4500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/niro.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/niro.studio/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = niro.studio) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name niro.studio;
    return 404;
}
